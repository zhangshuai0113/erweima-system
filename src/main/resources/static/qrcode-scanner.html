<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码扫描</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .scanner-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #canvas {
            display: none;
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .scan-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid #667eea;
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            animation: scan 2s infinite;
        }

        @keyframes scan {
            0% {
                top: 0;
            }
            100% {
                top: 100%;
            }
        }

        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
        }

        .corner.top-left {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
        }

        .corner.top-right {
            top: -2px;
            right: -2px;
            border-left: none;
            border-bottom: none;
        }

        .corner.bottom-left {
            bottom: -2px;
            left: -2px;
            border-right: none;
            border-top: none;
        }

        .corner.bottom-right {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
        }

        .controls {
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            padding: 20px;
            background: #f0f7ff;
            border-top: 1px solid #e0e0e0;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-content {
            background: white;
            padding: 12px;
            border-radius: 6px;
            word-break: break-all;
            font-size: 14px;
            color: #333;
            border-left: 3px solid #667eea;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .result-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
        }

        .status {
            padding: 15px 20px;
            text-align: center;
            font-size: 13px;
            color: #666;
            border-top: 1px solid #e0e0e0;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.error {
            background: #fee;
            color: #c33;
        }

        .status.success {
            background: #efe;
            color: #3c3;
        }

        .status.info {
            background: #eef;
            color: #33c;
        }

        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
            animation: loading 1.4s infinite;
        }

        @keyframes loading {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 二维码扫描</h1>
            <p>对准二维码即可自动扫描</p>
        </div>

        <div class="scanner-wrapper">
            <video id="video" playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="scanner-overlay">
                <div class="scan-box">
                    <div class="scan-line"></div>
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" id="startBtn">启动摄像头</button>
            <button class="btn-secondary" id="stopBtn" disabled>停止扫描</button>
            <button class="btn-secondary" id="uploadBtn">上传图片</button>
        </div>

        <div class="status info show" id="status">
            <span class="loading"></span> 准备就绪，点击启动摄像头
        </div>

        <div class="result" id="result">
            <div class="result-title">扫描结果</div>
            <div class="result-content" id="resultContent"></div>
            <div class="result-actions">
                <button class="btn-primary" id="copyBtn">复制</button>
                <button class="btn-secondary" id="openBtn">打开链接</button>
            </div>
        </div>

        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const result = document.getElementById('result');
        const resultContent = document.getElementById('resultContent');
        const status = document.getElementById('status');
        const copyBtn = document.getElementById('copyBtn');
        const openBtn = document.getElementById('openBtn');

        let scanning = false;
        let stream = null;
        let currentResult = null;

        // 启动摄像头
        startBtn.addEventListener('click', async () => {
            try {
                startBtn.disabled = true;
                showStatus('正在请求摄像头权限...', 'info');

                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                video.srcObject = stream;
                video.play();
                scanning = true;
                stopBtn.disabled = false;

                showStatus('摄像头已启动，请对准二维码', 'info');
                scan();
            } catch (err) {
                showStatus('无法访问摄像头: ' + err.message, 'error');
                startBtn.disabled = false;
            }
        });

        // 停止扫描
        stopBtn.addEventListener('click', () => {
            scanning = false;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            stopBtn.disabled = true;
            startBtn.disabled = false;
            showStatus('已停止扫描', 'info');
        });

        // 上传图片
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    if (code) {
                        handleQRCode(code.data);
                    } else {
                        showStatus('未检测到二维码', 'error');
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 复制结果
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentResult).then(() => {
                showStatus('已复制到剪贴板', 'success');
            });
        });

        // 打开链接
        openBtn.addEventListener('click', () => {
            if (currentResult.startsWith('http://') || currentResult.startsWith('https://')) {
                window.open(currentResult, '_blank');
            } else {
                showStatus('不是有效的链接', 'error');
            }
        });

        // 扫描循环
        function scan() {
            if (!scanning) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    handleQRCode(code.data);
                    return;
                }
            }

            requestAnimationFrame(scan);
        }

        // 处理二维码
        function handleQRCode(data) {
            currentResult = data;
            resultContent.textContent = data;
            result.classList.add('show');
            showStatus('扫描成功！', 'success');

            // 如果是URL，自动打开
            if (data.startsWith('http://') || data.startsWith('https://')) {
                setTimeout(() => {
                    if (confirm('是否打开此链接？\n\n' + data)) {
                        window.open(data, '_blank');
                    }
                }, 500);
            }
        }

        // 显示状态
        function showStatus(message, type = 'info') {
            status.textContent = message;
            status.className = 'status show ' + type;
        }

        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>

spring:
  application:
    name: erweima-system
  datasource:
    url: jdbc:mysql://localhost:3306/erweima?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: root
    password: 123456789
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.erweima: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# 二维码配置
qrcode:
  # 二维码尺寸（毫米/行）
  size-mm: 10
  # 输出格式
  format: jpg
  # 图片质量
  quality: 95
  # 防伪特征
  anti-fake:
    enabled: true
    # 特征版本
    version: 1
